# ============================================================
# GitHub Actions CI/CD Pipeline
# Equivalent to: logicapp.standard.management.framework.yml
#
# What this does:
#   1. BUILD     - Restores & builds the full solution
#   2. TEST      - Runs unit tests + collects code coverage
#   3. PACKAGE   - Packs & publishes NuGet packages for:
#                    - LogicApps.Management.Models
#                    - LogicApps.Management.Repository
#                    - LogicApps.Management
#                    - LogicApps.TestFramework.Specifications
#
# Triggers:
#   - Push / PR  to main  →  runs Build + Test only
#   - Push of a version tag (v1.2.3)  →  runs Build + Test + Package
#
# Required GitHub repository settings (Settings → Secrets and variables → Actions):
#   NUGET_API_KEY   - Your NuGet.org API key  (only needed if pushing to nuget.org)
#                     If you want to publish to GitHub Packages instead, this is
#                     not needed - the built-in GITHUB_TOKEN is used automatically.
#
# Versioning:
#   Tags drive the version.  Create a tag like v1.1.42 and the packages
#   will be versioned 1.1.42.  On non-tag runs the version is 0.0.0-preview
#   so you can always see what a package would look like without publishing it.
# ============================================================

name: CI/CD - Build, Test & Package

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'           # e.g. v1.1.42
  pull_request:
    branches:
      - main

# Allow the workflow to write packages to GitHub Packages
permissions:
  contents: write          # needed to create a GitHub Release
  packages: write          # needed to push to GitHub Packages (NuGet)

env:
  DOTNET_VERSION: '10.x'
  SOLUTION_PATH: 'LogicAppStandardManagementFramework.slnx'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MODELS_PROJECT: 'source/Management.Models/LogicApps.Management.Models.csproj'
  REPOSITORY_PROJECT: 'source/Management.Repository/LogicApps.Management.Repository.csproj'
  MANAGEMENT_PROJECT: 'source/Management/LogicApps.Management.csproj'
  SPECIFICATIONS_PROJECT: 'source/TestFramework.Specifications/LogicApps.TestFramework.Specifications.csproj'
  # Unit-test projects (integration tests are excluded - they need live Azure resources)
  UNIT_TEST_FILTER: 'Management.Repository.Tests|Management.Tests|TestFramework.Specifications.Tests'

jobs:
  # ──────────────────────────────────────────────
  # JOB 1 - Build & Unit Test
  # ──────────────────────────────────────────────
  build-and-test:
    name: Build and Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet packages
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      # Run unit tests only (Management.Tests, Management.Repository.Tests, TestFramework.Specifications.Tests)
      # IntegrationTests are intentionally excluded - they require a live Azure environment.
      - name: Run unit tests
        run: |
          dotnet test ${{ env.SOLUTION_PATH }} \
            --configuration Release \
            --no-build \
            --filter "FullyQualifiedName~Management.Tests|FullyQualifiedName~Management.Repository.Tests|FullyQualifiedName~TestFramework.Specifications.Tests" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --logger "trx;LogFileName=unit-tests.trx"

      # Generate a human-readable HTML + Cobertura coverage report
      - name: Generate code coverage report
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:"./TestResults/**/coverage.cobertura.xml" \
            -targetdir:"./TestResults/CoverageReport" \
            -reporttypes:"HtmlInline;Cobertura" \
            -assemblyfilters:"-LogicApps.Management.Models*"
        continue-on-error: true   # don't fail the build if no coverage data exists yet

      # Upload test results so they appear in the GitHub Actions summary
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()              # upload even when tests fail
        with:
          name: test-results
          path: ./TestResults

      # Upload coverage report as a build artifact
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./TestResults/CoverageReport

  # ──────────────────────────────────────────────
  # JOB 2 - Pack & Publish NuGet packages
  #         Only runs when a version tag is pushed
  # ──────────────────────────────────────────────
  package-and-publish:
    name: Package and Publish
    runs-on: ubuntu-latest
    needs: build-and-test          # only run if build + test passed
    if: startsWith(github.ref, 'refs/tags/v')   # only on version tags

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Derive the semantic version from the Git tag (strips the leading 'v')
      # Tag v1.1.42  →  packageVersion = 1.1.42
      - name: Set package version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"          # e.g. v1.1.42
          VERSION="${TAG#v}"                    # strip leading 'v'  →  1.1.42
          echo "packageVersion=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Restore NuGet packages
        run: dotnet restore ${{ env.SOLUTION_PATH }}


      # One build of the full solution covers all four pack steps below
      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      # Pack order: Models -> Repository -> Management -> Specifications (dependency order)
      - name: Pack LogicApps.Management.Models
        run: |
          dotnet pack ${{ env.MODELS_PROJECT }} \
            --configuration Release \
            --no-build \
            --output ./artifacts \
            /p:PackageVersion=${{ steps.version.outputs.packageVersion }}

      - name: Pack LogicApps.Management.Repository
        run: |
          dotnet pack ${{ env.REPOSITORY_PROJECT }} \
            --configuration Release \
            --no-build \
            --output ./artifacts \
            /p:PackageVersion=${{ steps.version.outputs.packageVersion }}

      - name: Pack LogicApps.Management
        run: |
          dotnet pack ${{ env.MANAGEMENT_PROJECT }} \
            --configuration Release \
            --no-build \
            --output ./artifacts \
            /p:PackageVersion=${{ steps.version.outputs.packageVersion }}

      - name: Pack LogicApps.TestFramework.Specifications
        run: |
          dotnet pack ${{ env.SPECIFICATIONS_PROJECT }} \
            --configuration Release \
            --no-build \
            --output ./artifacts \
            /p:PackageVersion=${{ steps.version.outputs.packageVersion }}
      # ── Upload .nupkg files as workflow artifacts ──
      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.version.outputs.packageVersion }}
          path: ./artifacts/*.nupkg

      # ── Publish to GitHub Packages (NuGet) ────────
      - name: Publish to GitHub Packages
        run: |
          dotnet nuget add source \
            --username "${{ github.repository_owner }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

          dotnet nuget push "./artifacts/*.nupkg" \
            --source github \
            --skip-duplicate

      # ── Publish to NuGet.org ───────
      - name: Publish to NuGet.org
        run: |
          dotnet nuget push "./artifacts/**/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate

      # ── Create a GitHub Release with the .nupkg files attached ──
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ steps.version.outputs.packageVersion }}"
          body: |
            ## NuGet Packages - v${{ steps.version.outputs.packageVersion }}

            | Package | Version |
            |---|---|
            | `LogicApps.Management.Models` | `${{ steps.version.outputs.packageVersion }}` |
            | `LogicApps.Management.Repository` | `${{ steps.version.outputs.packageVersion }}` |
            | `LogicApps.Management` | `${{ steps.version.outputs.packageVersion }}` |
            | `LogicApps.TestFramework.Specifications` | `${{ steps.version.outputs.packageVersion }}` |

            The `.nupkg` files are attached below and are also published to [GitHub Packages](https://github.com/${{ github.repository }}/packages).
          files: ./artifacts/*.nupkg
          draft: false
          prerelease: false
